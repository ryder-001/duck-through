<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>钻门大冒险</title>
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>

    <!-- 开始屏幕 -->
    <div class="overlay" id="startScreen">
        <h1>钻门大冒险</h1>
        <p>爸爸扛着儿子穿过房间去参加生日派对🎂</p>
        <p>门洞太矮，赶紧让儿子低头！</p>
        <p class="hint">按住屏幕 或 空格键 = 儿子低头</p>
        <p class="hint">⚡ 注意体力条，不能一直低头哦！</p>
        <button class="btn" id="startBtn">开始冒险</button>
        <button class="btn btn-secondary" id="shopBtn">🛒 商店</button>
        <button class="btn btn-secondary" id="dailyBtn">📋 每日任务</button>
    </div>

    <!-- 游戏结束屏幕 -->
    <div class="overlay hidden" id="gameOverScreen">
        <h1>撞到门框了！</h1>
        <p class="score-display">得分：<span id="finalScore">0</span></p>
        <p>最高纪录：<span id="highScore">0</span></p>
        <button class="btn" id="restartBtn">再来一次</button>
    </div>

    <!-- 商店屏幕 -->
    <div class="overlay hidden" id="shopScreen">
        <h1>🛒 商店</h1>
        <div class="shop-content" id="shopContent"></div>
        <button class="btn btn-secondary" id="shopBackBtn">返回</button>
    </div>

    <!-- 每日任务屏幕 -->
    <div class="overlay hidden" id="dailyScreen">
        <h1>📋 每日任务</h1>
        <div class="daily-content" id="dailyContent"></div>
        <button class="btn btn-secondary" id="dailyBackBtn">返回</button>
    </div>
</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
